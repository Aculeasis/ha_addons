<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy Monitor</title>
  <meta name="description" content="Real-time SOCKS5 proxy monitoring dashboard with TCP and UDP checks, historical charts and web-based configuration." />
  <link rel="stylesheet" href="css/vars.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/datetime-picker.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <!-- Chart.js date adapter (for time scale) -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  SVG SPRITE MAP                                                 -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<svg aria-hidden="true" style="position: absolute; width: 0; height: 0; overflow: hidden;" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Logo Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8af5"/>
      <stop offset="100%" stop-color="#9b5cf5"/>
    </linearGradient>

    <!-- Shared sparkline gradients (referenced by all card SVGs) -->
    <linearGradient id="sparkline-grad-tcp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8af5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5b8af5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sparkline-grad-udp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b5cf5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9b5cf5" stop-opacity="0"/>
    </linearGradient>

    <!-- Icons -->
    <symbol id="icon-logo" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/>
    </symbol>

    <symbol id="icon-theme-light" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
    </symbol>
    
    <symbol id="icon-theme-dark" viewBox="0 0 24 24">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </symbol>
    
    <symbol id="icon-theme-system" viewBox="0 0 24 24">
      <rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    </symbol>

    <symbol id="icon-eye-open" viewBox="0 0 24 24">
      <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/><circle cx="12" cy="12" r="3"/>
    </symbol>

    <symbol id="icon-eye-closed" viewBox="0 0 24 24">
      <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>
    </symbol>

    <symbol id="icon-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </symbol>

    <symbol id="icon-circle-dots" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
    </symbol>
  </defs>
</svg>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  NAV                                                            -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<nav class="nav">
  <div class="nav-logo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <use href="#icon-logo"></use>
    </svg>
    <span class="brand">Proxy Monitor</span>
  </div>

  <div class="nav-pills" id="nav-pills"></div>

  <div class="nav-right">
    <div class="ws-dot" id="ws-dot" title="WebSocket connection"></div>
    <span class="last-updated" id="last-updated">—</span>
    
    <div class="theme-switcher">
      <button class="btn btn-ghost btn-sm btn-icon" title="Change Theme" onclick="toggleThemeMenu(event)">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
      </button>
      <div class="dropdown-menu theme-menu" id="theme-menu">
        <button onclick="applyTheme('light')" id="theme-opt-light"><span>☀️</span> Light</button>
        <button onclick="applyTheme('dark')" id="theme-opt-dark"><span>🌙</span> Dark</button>
        <button onclick="applyTheme('system')" id="theme-opt-system"><span>💻</span> System</button>
      </div>
    </div>

    <button class="btn btn-ghost btn-sm btn-icon" onclick="togglePrivacyMode()" title="Privacy Mode (Blur sensitive data)">
      <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <use href="#icon-eye-open"></use>
      </svg>
    </button>

    <button class="btn btn-ghost btn-sm btn-icon-mobile" id="btn-settings" onclick="openSettings()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <use href="#icon-settings"></use>
      </svg>
      <span>Settings</span>
    </button>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  MAIN                                                           -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<main class="container">
  <!-- ── Dashboard ─── -->

  <!-- ── Dashboard ─── -->
  <div>
    <div class="proxy-grid" id="proxy-grid">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <use href="#icon-circle-dots"></use>
        </svg>
        <p>Connecting…</p>
      </div>
    </div>
  </div>
</main>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  DETAIL MODAL                                                   -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay detail-modal hidden" id="detail-modal" onclick="closeDetailIfBg(event)">
  <div class="modal" style="width:min(1000px,96vw);max-height:90vh;">
    <div class="modal-header">
      <h2 id="detail-title">Proxy detail</h2>
      <button class="modal-close" onclick="closeDetail()">×</button>
    </div>
    <div class="modal-body" id="detail-body">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  SETTINGS MODAL                                                 -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay settings-modal hidden" id="settings-modal" onclick="closeSettingsIfBg(event)">
  <div class="modal" style="width:min(820px,96vw);max-height:90vh;">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body" id="settings-body">
      <div style="text-align:center;padding:40px"><div class="spinner"></div></div>
    </div>
    <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  LOGIN MODAL                                                    -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay login-modal hidden" id="login-modal">
  <div class="modal" style="width:min(360px,96vw);">
    <div class="modal-header">
      <h2>Sign In</h2>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#5b8af5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <use href="#icon-circle-dots"></use>
        </svg>
        <p>Proxy Monitor</p>
      </div>
      <div class="form-group">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <span class="login-error hidden" id="login-error"></span>
      <button class="btn btn-primary" id="login-btn" onclick="doLogin()" style="width:100%">Sign In</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!--  TOASTS                                                         -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script src="js/ws.js"></script>
<script src="js/ui.js"></script>
  <script src="js/datetime-picker.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/settings.js"></script>
<script src="js/main.js"></script>
</body>
</html>
