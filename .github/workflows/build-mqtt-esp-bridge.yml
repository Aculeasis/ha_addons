name: 'Publish HA Add-on: mqtt-esp-bridge'

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., latest, v1.0.0)'
        required: true
        default: 'latest'
  push:
    branches:
      - main
    paths:
      - 'mqtt-esp-bridge/config.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: version_check
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "New branch push. Proceeding."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff ${{ github.event.before }} ${{ github.event.after }} -- mqtt-esp-bridge/config.yaml | grep -q '^+version:'; then
            echo "Version changed. Proceeding."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged. Skipping build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'push' || steps.version_check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name != 'push' || steps.version_check.outputs.changed == 'true'
        id: build-push
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            --all \
            --target mqtt-esp-bridge \
            --docker-hub ghcr.io/aculeasis
